<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navbar</title>
    <style type="text/css">
        *{
            text-decoration:none;
        }
        .navbar{
            background :crimson; font-family :calibri; padding-left:15px; padding-right:15px;
        }
        .navdiv{
            display :flex; align-items: center; justify-content:space-between;
        }
        .logo a{
            font-size: 35px; font-weight:600px; color:white;
        }
        li{
            list-style:none; display:inline-block;
        }
        li a{
            color:white; font-size:"18px"; font-weight: bold; margin-right: 25px;
        }
        button{
            background-color:black; margin-left:10px; border-radius:10px; padding:10px;width:90;
        }
        button{
            color:white; font-weight:bold; font-size:10px;
        }

    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navdiv">
            <div class="logo"><a href="#">SOFTWARE</a></div>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
                <button><a href="#">SignIn</a></button>
                <button><a href="#">SignUp</a></button>     
              </ul>
        </div>
    </nav>
</body
</html>
